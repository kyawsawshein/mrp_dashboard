kind = "web"
previewPath = "/"
title = "MRP Dashboard"
version = "1.0.0"
id = "artifacts/mrp-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19051

[services.development]
run = "pnpm --filter @workspace/mrp-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mrp-dashboard", "run", "build" ]
publicDir = "artifacts/mrp-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19051"
BASE_PATH = "/"
